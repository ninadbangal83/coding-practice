<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 01: HTML Basics</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif; /* Native OS Font (no links needed!) */
            background-color: whitesmoke;                      /* Easy-to-remember background */
            color: #333;                                       /* Soft charcoal text */
            padding: 20px;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        h2 {
            color: royalblue;                                  /* Easy-to-remember primary color */
            font-size: 20px;
            margin: 20px 0 10px;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            color: #666;
        }

        ul, ol {
            margin: 10px 0;
            padding-left: 20px;
            font-size: 16px;
            color: #666;
        }

        li {
            margin-bottom: 6px;
        }

        .btn {
            display: inline-block;
            background-color: royalblue;                       /* Easy-to-remember button */
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome Title</h1>
        <p>This is a paragraph inside a simple layout. You can make text <strong>bold</strong> or <em>italic</em>.</p>

        <h2>Shopping List</h2>
        <ul>
            <li>Fresh avocados</li>
            <li>Sourdough bread</li>
        </ul>

        <h2>Learning Steps</h2>
        <ol>
            <li>Master HTML structure</li>
            <li>Apply easy-to-remember styles</li>
        </ol>

        <button class="btn" onclick="alert('Success!')">Get Started</button>
    </div>

</body>
</html>
