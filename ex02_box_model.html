<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 02: Box Model</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: whitesmoke;
            color: #333;
            padding: 20px;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .box {
            width: 100%;
            height: 120px;
            background-color: lightgray;       /* Simple built-in background */
            color: royalblue;                   /* Simple built-in highlight text */
            
            /* Box spacing settings */
            padding: 20px;                      /* Space inside the box */
            border: 4px solid royalblue;        /* Modern border outline */
            margin: 20px 0;                     /* Space outside the box pushing neighbors */
            
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        p {
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Understanding Box Model</h1>
        <p>Text above the box.</p>

        <div class="box">
            Inside Content Box
        </div>

        <p>Text below the box. Notice how the margin pushes me down!</p>
    </div>

</body>
</html>
