<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>State-Driven Image Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Image Carousel Slider</h2>
        
        <div class="carousel-frame">
            <!-- Image Viewport -->
            <div class="image-container">
                <img id="slider-img" src="https://picsum.photos/id/237/400/250" alt="Scenic View">
            </div>

            <!-- Control Buttons -->
            <button class="nav-btn prev" id="go-prev">&#10094;</button>
            <button class="nav-btn next" id="go-next">&#10095;</button>
        </div>

        <!-- Visual Position Indicators -->
        <div class="dots-row" id="dots-container">
            <!-- Generated Dynamically -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
