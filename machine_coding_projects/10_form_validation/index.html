<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Register Account</h2>
        <form id="master-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="text" id="email" placeholder="user@domain.com">
                <div class="error" id="error-email">Invalid email format</div>
            </div>
            <div class="input-group">
                <label>Password (6+ characters)</label>
                <input type="password" id="pass" placeholder="••••••••">
                <div class="error" id="error-pass">Must be at least 6 characters</div>
            </div>
            <button type="submit" class="submit-btn">Verify & Submit</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
