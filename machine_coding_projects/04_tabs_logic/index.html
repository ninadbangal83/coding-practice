<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Tabs & Accordions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Tabs Interface</h2>
        <div class="tabs-header" id="tabs-wrapper">
            <button class="tab-btn active" data-id="home">Home</button>
            <button class="tab-btn" data-id="services">Services</button>
            <button class="tab-btn" data-id="contact">Contact</button>
        </div>
        <div class="tab-body">
            <div id="home" class="tab-content active">Welcome to the homepage view dashboard.</div>
            <div id="services" class="tab-content">List of all corporate services provided here.</div>
            <div id="contact" class="tab-content">Reach out at support@domain.com!</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
