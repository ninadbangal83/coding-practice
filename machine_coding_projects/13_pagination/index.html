<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pagination Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Catalog Library</h2>
        <div id="items-view" class="items-grid">
            <!-- Cards render here -->
        </div>
        <div class="pagination-bar">
            <button id="prev-btn" class="pg-btn">Previous</button>
            <span id="page-label">Page 1 of X</span>
            <button id="next-btn" class="pg-btn">Next</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
