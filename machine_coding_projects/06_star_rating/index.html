<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Rating Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Rate Your Experience</h2>
        <div id="star-box" class="star-container">
            <span class="star" data-rank="1">★</span>
            <span class="star" data-rank="2">★</span>
            <span class="star" data-rank="3">★</span>
            <span class="star" data-rank="4">★</span>
            <span class="star" data-rank="5">★</span>
        </div>
        <div id="log-text" class="score-box">Select a rating above</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
