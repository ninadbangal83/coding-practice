<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vanilla JS Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Task Manager</h2>
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="Add a new task..." autofocus>
            <button id="add-btn">Add</button>
        </div>
        <ul id="todo-list">
            <!-- Items generated dynamically via JS -->
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
