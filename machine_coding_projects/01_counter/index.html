<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stateful Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Counter Machine</h2>
        <div class="counter-box">
            <button class="ctrl-btn" id="decrement">−</button>
            <div class="count-value" id="count-display">0</div>
            <button class="ctrl-btn" id="increment">+</button>
        </div>
        <button id="reset" class="reset-btn">Reset Value</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
