<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Precision Stopwatch</h2>
        <div class="time-display" id="display">00:00:00</div>
        <div class="controls">
            <button id="start-btn" class="btn-start">Start</button>
            <button id="pause-btn" class="btn-pause">Pause</button>
            <button id="reset-btn" class="btn-reset">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
