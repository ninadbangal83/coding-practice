<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Native HTML5 Drag & Drop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Drag and Drop Slots</h2>
        <p class="instructions">Drag the colored token between the dotted containers below.</p>
        
        <div id="zone-1" class="drop-zone">
            <div class="drag-token" draggable="true" id="master-token">DRAG ME</div>
        </div>
        
        <div id="zone-2" class="drop-zone">
            <!-- Droppable target area -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
